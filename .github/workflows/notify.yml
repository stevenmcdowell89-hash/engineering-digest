name: Notify subscribers of a new issue

# Auto-trigger: any push to main that ADDS a new issues/issue-*.html file.
# Typo fixes / edits to existing files do NOT re-notify.
#
# Manual fallback: Actions tab → Run workflow with explicit inputs.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   NOTIFY_TOKEN    — matches the Worker's NOTIFY_TOKEN secret
#   SITE_BASE_URL   — full origin of the published site, e.g.
#                     https://engineering-digest.steven-mcdowell-89.workers.dev
#                     The action POSTs to ${SITE_BASE_URL}/api/notify and uses
#                     the same base for the in-notification issue URL.

on:
  push:
    branches: [main]
    paths:
      - 'issues/issue-*.html'
  workflow_dispatch:
    inputs:
      issue:
        description: 'Issue number (e.g. 11)'
        required: true
        type: string
      headline:
        description: 'One-line headline for the notification body'
        required: true
        type: string
      url:
        description: 'Full URL of the issue (optional — auto-built from SITE_BASE_URL if blank)'
        required: false
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve notification payload
        id: payload
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
          EVENT: ${{ github.event_name }}
          INPUT_ISSUE: ${{ inputs.issue }}
          INPUT_HEADLINE: ${{ inputs.headline }}
          INPUT_URL: ${{ inputs.url }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          set -euo pipefail

          if [ "$EVENT" = "workflow_dispatch" ]; then
            ISSUE="$INPUT_ISSUE"
            HEADLINE="$INPUT_HEADLINE"
            URL="${INPUT_URL:-${SITE_BASE_URL}/issues/issue-${ISSUE}.html}"
            echo "Manual run for issue $ISSUE"
          else
            # Push event — find newly ADDED issue files only (filter A = added)
            ADDED=$(git diff --name-only --diff-filter=A "$BEFORE" "$AFTER" -- 'issues/issue-*.html' || true)
            if [ -z "$ADDED" ]; then
              echo "No new issue files added in this push — skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Use the first added file (in practice there's one)
            FILE=$(echo "$ADDED" | head -n 1)
            echo "New issue file: $FILE"

            # Extract issue number from filename (issues/issue-11.html → 11)
            ISSUE=$(echo "$FILE" | sed -E 's|issues/issue-([0-9.]+)\.html|\1|')

            HEADLINE=$(python3 scripts/extract-lead-headline.py "$FILE")

            if [ -z "$HEADLINE" ]; then
              HEADLINE="A new issue is out — read this week's briefing."
            fi

            URL="${SITE_BASE_URL}/issues/issue-${ISSUE}.html"
          fi

          if [ -z "${SITE_BASE_URL:-}" ] && [ -z "${INPUT_URL:-}" ]; then
            echo "Missing SITE_BASE_URL secret — set it in repo settings." >&2
            exit 1
          fi

          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"
          echo "headline<<EOF" >> "$GITHUB_OUTPUT"
          echo "$HEADLINE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Send push
        if: steps.payload.outputs.skip != 'true'
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
          ISSUE: ${{ steps.payload.outputs.issue }}
          HEADLINE: ${{ steps.payload.outputs.headline }}
          URL: ${{ steps.payload.outputs.url }}
        run: |
          set -euo pipefail

          if [ -z "$SITE_BASE_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "Missing SITE_BASE_URL or NOTIFY_TOKEN repository secrets" >&2
            exit 1
          fi

          PAYLOAD=$(jq -n \
            --arg title "Issue $ISSUE is out" \
            --arg body "$HEADLINE" \
            --arg url "$URL" \
            '{title: $title, body: $body, url: $url}')

          echo "Payload:"
          echo "$PAYLOAD"

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "$SITE_BASE_URL/api/notify" \
            -H "authorization: Bearer $NOTIFY_TOKEN" \
            -H "content-type: application/json" \
            -d "$PAYLOAD")

          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)

          echo "Worker responded with status: $STATUS"
          echo "$BODY" | jq .

          if [ "$STATUS" != "200" ]; then
            exit 1
          fi
